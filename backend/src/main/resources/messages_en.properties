error.auth.reset_token_used=This password reset link has already been used
error.auth.reset_token_expired=Password reset link expired. Please request a new one.
error.auth.invalid_current_password=Current password is incorrect

error.ride.race_not_found=Race not found
error.ride.not_found=Ride not found
error.ride.no_permission_to_update=You do not have permission to update this ride
error.ride.no_permission_to_delete=You do not have permission to delete this ride
error.ride.seats_below_passengers=Seats cannot be fewer than the already-registered passengers ({0})
error.ride.no_seats=No available seats
