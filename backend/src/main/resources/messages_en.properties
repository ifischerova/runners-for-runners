error.auth.user_not_found=User not found
error.auth.username_exists=Username already exists
error.auth.email_exists=Email already exists
error.auth.invalid_verification_token=Invalid verification link
error.auth.verification_token_used=This verification link has already been used
error.auth.verification_token_expired=Verification link expired. Please request a new one.
