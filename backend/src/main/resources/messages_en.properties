# Spring Security exceptions (resolved by GlobalExceptionHandler)
error.security.invalid_credentials=Invalid credentials
error.security.disabled=Your account is not yet verified. Please check your email or request a new verification link.
error.security.access_denied=You do not have permission for this operation
error.generic.bad_request=Invalid request
error.generic.internal=Internal server error

# Email subjects + bodies
email.verification.subject=Bezci sobe – please verify your email
email.verification.body=Welcome to Bezci sobe!\n\nPlease verify your email by clicking the link below:\n\n{0}\n\nThe link is valid for 24 hours. If you did not register, just ignore this email.\n\nThank you,\nthe Bezci sobe team

email.password_reset.subject=Bezci sobe – password reset
email.password_reset.body=We received a request to reset your password.\n\nYou can set a new password by clicking the link below:\n\n{0}\n\nThe link is valid for 1 hour. If you didn't request a reset, you can ignore this email — your password stays unchanged.\n\nThe Bezci sobe team

email.password_changed.subject=Bezci sobe – your password was changed
email.password_changed.body=Your password was just changed.\n\nIf this wasn't you, please contact the application administrator immediately.\n\nThe Bezci sobe team

email.account_deleted.subject=Bezci sobe – your account has been deleted
email.account_deleted.body=Your account has been deleted at your request.\n\nAll your rides and personal data have been removed from the database.\n\nYou are welcome to register again any time.\n\nThe Bezci sobe team

email.ride.accepted.subject=Bezci sobe – a passenger accepted your ride
email.ride.accepted.body=Hi {0},\n\nUser {1} ({2}) just accepted your ride offer to "{3}" on {4}.\n\nCheck the ride detail in the app.\n\nThe Bezci sobe team

email.ride.acceptance_cancelled.subject=Bezci sobe – passenger cancelled their acceptance
email.ride.acceptance_cancelled.body=Hi {0},\n\nUser {1} ({2}) cancelled their acceptance of your ride to "{3}" on {4}.\n\nOne seat is now free again.\n\nThe Bezci sobe team

email.ride.deleted.subject=Bezci sobe – ride cancelled by the driver
email.ride.deleted.body=Hi {0},\n\nDriver {1} ({2}) has cancelled the ride to "{3}" on {4} that you had accepted.\n\nYou can find another ride in the app or contact the driver directly.\n\nThe Bezci sobe team

email.ride.deleted_by_admin.passenger.subject=Bezci sobe – ride cancelled by administrator
email.ride.deleted_by_admin.passenger.body=Hi {0},\n\nThe ride to "{1}" on {2} that you had accepted has been cancelled by the application administrator.\n\nFor more details, please contact the administrator.\n\nThe Bezci sobe team

email.ride.deleted_by_admin.driver.subject=Bezci sobe – your ride was cancelled by administrator
email.ride.deleted_by_admin.driver.body=Hi {0},\n\nYour ride to "{1}" on {2} has been cancelled by the application administrator.\n\nFor more details, please contact the administrator.\n\nThe Bezci sobe team
