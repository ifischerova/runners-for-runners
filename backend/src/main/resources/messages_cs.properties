# Email subjects + bodies
email.verification.subject=Běžci sobě – ověřte svou e-mailovou adresu
email.verification.body=Vítejte v Běžci sobě!\n\nPro dokončení registrace prosím ověřte svou e-mailovou adresu kliknutím na následující odkaz:\n\n{0}\n\nOdkaz je platný 24 hodin. Pokud jste se neregistrovali, tento e-mail prostě ignorujte.\n\nDěkujeme,\ntým Běžci sobě

email.password_reset.subject=Běžci sobě – obnovení hesla
email.password_reset.body=Obdrželi jsme žádost o obnovení hesla pro váš účet.\n\nNové heslo si můžete nastavit kliknutím na následující odkaz:\n\n{0}\n\nOdkaz je platný 1 hodinu. Pokud jste o obnovení nežádali, tento e-mail můžete ignorovat – heslo zůstane beze změny.\n\nTým Běžci sobě

email.password_changed.subject=Běžci sobě – heslo bylo změněno
email.password_changed.body=Tvé heslo bylo právě změněno.\n\nPokud jsi to nebyl ty, kontaktuj prosím okamžitě administrátora aplikace.\n\nTým Běžci sobě

email.account_deleted.subject=Běžci sobě – tvůj účet byl smazán
email.account_deleted.body=Tvůj účet byl právě smazán na tvou žádost.\n\nVšechny tvé jízdy a údaje byly z databáze odstraněny.\n\nKdyby ses chtěl/a vrátit, jsi vítán/a se zaregistrovat znovu.\n\nTým Běžci sobě

email.ride.accepted.subject=Běžci sobě – nový spolujezdec přijal tvou jízdu
email.ride.accepted.body=Ahoj {0},\n\nUživatel {1} ({2}) právě přijal tvou nabídku jízdy na závod "{3}" dne {4}.\n\nPodívej se na detail jízdy v aplikaci.\n\nTým Běžci sobě

email.ride.acceptance_cancelled.subject=Běžci sobě – spolujezdec zrušil přijetí
email.ride.acceptance_cancelled.body=Ahoj {0},\n\nUživatel {1} ({2}) zrušil přijetí tvé jízdy na závod "{3}" dne {4}.\n\nUvolnilo se jedno místo.\n\nTým Běžci sobě

email.ride.deleted.subject=Běžci sobě – jízda byla zrušena řidičem
email.ride.deleted.body=Ahoj {0},\n\nŘidič {1} ({2}) zrušil jízdu na závod "{3}" dne {4}, kterou jsi měl/a přijatou.\n\nMůžeš si v aplikaci najít jinou jízdu nebo řidiče kontaktovat přímo.\n\nTým Běžci sobě

email.ride.deleted_by_admin.passenger.subject=Běžci sobě – jízda byla zrušena administrátorem
email.ride.deleted_by_admin.passenger.body=Ahoj {0},\n\nJízda na závod "{1}" dne {2}, kterou jsi měl/a přijatou, byla zrušena administrátorem aplikace.\n\nPokud potřebuješ vědět víc, kontaktuj administrátora.\n\nTým Běžci sobě

email.ride.deleted_by_admin.driver.subject=Běžci sobě – tvá jízda byla zrušena administrátorem
email.ride.deleted_by_admin.driver.body=Ahoj {0},\n\nTvá jízda na závod "{1}" dne {2} byla zrušena administrátorem aplikace.\n\nPokud potřebuješ vědět víc, kontaktuj administrátora.\n\nTým Běžci sobě
