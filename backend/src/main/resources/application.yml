spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/bezcisobe}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    # HS256 needs a key of at least 256 bits (32 chars). Override the default
    # via the JWT_SECRET env var in any non-development environment.
    secret: ${JWT_SECRET:dev-only-placeholder-rotate-me-before-deploying-to-any-real-environment}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24 hours
  url: ${APP_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:no-reply@bezcisobe.local}
    # When true the EmailService logs the message and skips JavaMailSender. Lets the
    # backend run without SMTP credentials for local development.
    log-only: ${MAIL_LOG_ONLY:false}

server:
  port: 8080

# Actuator: expose health + info endpoints for monitoring (no sensitive data)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: Běžci sobě backend
    description: REST API for the runners' carpooling platform
    version: 1.0.0

# springdoc-openapi: Swagger UI at /swagger-ui/index.html, JSON at /v3/api-docs
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

# Logging levels: app at DEBUG in dev, framework noise at WARN
logging:
  level:
    root: INFO
    cz.bezcisobe.backend: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
