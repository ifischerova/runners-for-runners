spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bezcisobe
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: bezciSobeJwtSecretKeyThatIsLongEnoughForHS256Algorithm2026
    expiration-ms: 86400000  # 24 hours

server:
  port: 8080
