spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

  # Dummy SMTP target so JavaMailSender autoconfigures. Tests use @MockBean for
  # services that actually call EmailService, so no real connection is opened.
  mail:
    host: localhost
    port: 25

app:
  jwt:
    secret: testSecretKeyThatIsLongEnoughForHS256AlgorithmInTests2026
    expiration-ms: 86400000
  url: http://localhost:5173
  mail:
    from: no-reply@bezcisobe.test
    log-only: true
